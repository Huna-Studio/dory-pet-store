<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - الصفحة غير موجودة | دوري</title>
  <meta name="description" content="الصفحة التي تبحث عنها غير موجودة. ارجع إلى متجر دوري لأسماك وطيور الزينة.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/animations.css">
  
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐠</text></svg>">
  
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--gradient-dark);
      padding: var(--space-xl);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .error-page::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(57, 208, 216, 0.05) 0%, transparent 60%);
    }
    .error-content {
      position: relative;
      z-index: 1;
    }
    .error-fish {
      font-size: 6rem;
      margin-bottom: var(--space-lg);
      display: block;
      animation: float-bob-slow 4s ease-in-out infinite;
    }
    .error-code {
      font-size: clamp(6rem, 15vw, 10rem);
      font-weight: 800;
      color: var(--dory-cyan);
      line-height: 1;
      margin-bottom: var(--space-md);
      text-shadow: 0 0 40px rgba(57, 208, 216, 0.3);
    }
    .error-title {
      font-size: clamp(1.5rem, 3vw, 2rem);
      margin-bottom: var(--space-md);
    }
    .error-text {
      color: var(--mid-gray);
      font-size: 1.1rem;
      margin-bottom: var(--space-2xl);
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    .error-buttons {
      display: flex;
      gap: var(--space-md);
      justify-content: center;
      flex-wrap: wrap;
    }
    .error-bubbles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>
  <div class="error-bubbles">
    <div class="bubble" style="left:10%;width:20px;height:20px;animation-duration:8s,2s;animation-delay:0s;"></div>
    <div class="bubble" style="left:80%;width:30px;height:30px;animation-duration:10s,3s;animation-delay:2s;"></div>
    <div class="bubble" style="left:50%;width:15px;height:15px;animation-duration:7s,2.5s;animation-delay:4s;"></div>
  </div>
  
  <div class="error-page">
    <div class="error-content">
      <span class="error-fish">🐠</span>
      <div class="error-code">404</div>
      <h1 class="error-title">Oops! السمكة ضلت طريقها</h1>
      <p class="error-text">الصفحة التي تبحث عنها غير موجودة. ربما السمكة سبحت لمكان آخر! ارجع للصفحة الرئيسية واكتشف عالم دوري.</p>
      <div class="error-buttons">
        <a href="index.html" class="btn btn-primary">
          <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          الصفحة الرئيسية
        </a>
        <a href="marketplace.html" class="btn btn-secondary">
          <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
          المتجر
        </a>
      </div>
    </div>
  </div>
</body>
</html>
